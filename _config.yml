# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site.

# Basic Site Settings
locale                  : "en-US"
site_theme              : "contrast" # Changed from "default" to "contrast" (Sleek, highly readable). Options: "air", "sunrise", "mint", "dirt", "contrast"
title                   : "Elixir Summer School 2026" # Updated title
title_separator         : "-"
name                    : &name "Elixir Summer School"
description             : &description "Annual summer school focusing on concurrent programming, distributed systems, and OTP with Elixir."

# IMPORTANT: Update these to match your actual GitHub username and repository name
url                     : "https://paulburca2005.github.io/" 
baseurl                 : "/test2.github.io" # Enter your repo name here (e.g., "/elixir-summer-school")

repository              : "https://github.com/PaulBurca2005/test2.github.io"

# Site Author - Configured here to act as the Event Host/Organizer info in the sidebar
author:
  avatar                : "logo.png" # You can replace this asset with an Elixir/School logo
  name                  : "Elixir Summer School '26"
  bio                   : "Intensive hands-on training on Elixir, OTP, and scalable distributed systems."
  location              : "Bucharest, Romania"
  employer              : "PDQ"
  email                 : "organizers@example.org" 

# Publication Categories (Kept intact for theme parsing safety, but unused)
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'    
  conferences:
    title: 'Conference Papers'

# Site Settings
teaser                  : 
breadcrumbs             : false 
words_per_minute        : 160
future                  : true
read_more               : "disabled" 
talkmap_link            : false      

# Disabled comments to keep the single-page landing clean
comments:
  provider              : false 

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections configuration (Forced output to false to disable separate sub-pages)
collections:
  teaching:
    output: false
  publications:
    output: false
  portfolio:
    output: false
  talks:
    output: false

# Global defaults for rendering
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true # Set to false if you want to hide the left sidebar completely

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed 

permalink: /:categories/:title/
timezone: Etc/UTC 

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

html_compression:
  clippings: all
  ignore:
    envs: development